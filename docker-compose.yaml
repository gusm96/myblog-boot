version: '3'

# 운영 환경용
#
# 실행 방법:
#   docker compose --env-file backend/.env.prod up -d

services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: myblog
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myblog-net

  redis:
    image: redis:7-alpine
    restart: always
    container_name: rediscache
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - myblog-net

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - backend/.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    stop_grace_period: 30s
    networks:
      - myblog-net

  frontend:
    build:
      context: ./frontend
      args:
        # Docker 내부 통신: backend 서비스명으로 직접 호출
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - myblog-net

networks:
  myblog-net:

volumes:
  dbdata:
  redis-data:
