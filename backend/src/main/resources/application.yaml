server:
  forward-headers-strategy: native

spring:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 6000
      database: 0
  profiles:
    active: ${PROFILE}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

## JWT
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration: 600000
  refresh-token-expiration: 1209600000

# Visitor HMAC
visitor:
  hmac:
    secret: ${VISITOR_HMAC_SECRET}

# S3 (버킷 삭제됨 — S3 코드 정리 전까지 임시 더미값 유지, 이후 블록 전체 제거 예정)
cloud:
  aws:
    credentials:
      access-key: ${AWS_CREDENTIALS_ACCESS_KEY:dummy-access-key}
      secret-key: ${AWS_CREDENTIALS_SECRET_KEY:dummy-secret-key}
    s3:
      bucketName: myblog-boot-bucket
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false
