version: '3'

# 운영 환경용
#
# 실행 방법:
#   docker compose --env-file .env.prod up -d

services:
  db:
    image: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: myblog
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - spring-net

  redis:
    image: redis
    restart: always
    container_name: rediscache
    ports:
      - 6379:6379
    networks:
      - spring-net

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - spring-net

networks:
  spring-net:
volumes:
  dbdata:
