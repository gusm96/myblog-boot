version: '3'

# 운영 환경용
#
# 실행 방법:
#   docker compose --env-file backend/.env.prod up -d

services:
  db:
    image: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: myblog
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - myblog-net

  redis:
    image: redis
    restart: always
    container_name: rediscache
    ports:
      - "6379:6379"
    networks:
      - myblog-net

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    env_file:
      - backend/.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - myblog-net

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - myblog-net

networks:
  myblog-net:

volumes:
  dbdata:
