server:
  forward-headers-strategy: native

spring:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 6000
      database: 0
  profiles:
    active: ${PROFILE}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

## JWT
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration: 600000
  refresh-token-expiration: 1209600000
  absolute-lifetime: ${JWT_ABSOLUTE_LIFETIME:2592000000}
  grace-window-ms: ${JWT_GRACE_WINDOW_MS:10000}

# Visitor HMAC
visitor:
  hmac:
    secret: ${VISITOR_HMAC_SECRET}

# Post HMAC
post:
  view:
    hmac:
      secret: ${POST_VIEW_HMAC_SECRET}
  like:
    hmac:
      secret: ${POST_LIKE_HMAC_SECRET}

# Next.js on-demand revalidation webhook
revalidate:
  webhook:
    enabled: ${REVALIDATE_WEBHOOK_ENABLED:true}
    url: ${REVALIDATE_WEBHOOK_URL:http://localhost:3000/api/revalidate}
    secret: ${REVALIDATE_SECRET:}
    connect-timeout-ms: ${REVALIDATE_CONNECT_TIMEOUT:2000}
    read-timeout-ms: ${REVALIDATE_READ_TIMEOUT:3000}

security:
  cookie:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAMESITE:Lax}
    domain: ${COOKIE_DOMAIN:}
    path: ${COOKIE_PATH:/}
  login-attempt:
    window-ms: ${LOGIN_ATTEMPT_WINDOW_MS:600000}
    base-delay-ms: ${LOGIN_ATTEMPT_BASE_DELAY_MS:200}
    max-delay-ms: ${LOGIN_ATTEMPT_MAX_DELAY_MS:2000}
    trusted-proxy: ${LOGIN_ATTEMPT_TRUSTED_PROXY:false}
    lock-stages:
      - failure-count: 5
        lock-ms: ${LOGIN_ATTEMPT_LOCK_5_MS:60000}
      - failure-count: 10
        lock-ms: ${LOGIN_ATTEMPT_LOCK_10_MS:300000}
      - failure-count: 15
        lock-ms: ${LOGIN_ATTEMPT_LOCK_15_MS:900000}
      - failure-count: 20
        lock-ms: ${LOGIN_ATTEMPT_LOCK_20_MS:3600000}

# Blog metadata (RSS feed)
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  blog-title: ${BLOG_TITLE:MyBlog}
  blog-description: ${BLOG_DESCRIPTION:개발 블로그}

cloud:
  aws:
    credentials:
      access-key: ${AWS_CREDENTIALS_ACCESS_KEY}
      secret-key: ${AWS_CREDENTIALS_SECRET_KEY}
    s3:
      bucketName: ${AWS_S3_BUCKET_NAME}
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false
